name: Deploy — Dev

on:
  push:
    branches: [main]
    paths:
      - "infrastructure/**"
      - ".github/workflows/deploy-dev.yml"

permissions:
  contents: read
  id-token: write  # Required for OIDC AWS authentication

concurrency:
  group: terraform-deploy-dev
  cancel-in-progress: false  # Never cancel in-flight deploys

jobs:
  # Wait for all CI gates to pass before any deployment step.
  # This ensures lint, type check, tests, security scans, and IaC validation
  # have all succeeded on this exact commit before infra changes are applied.
  ci-gates:
    name: "Wait for CI Gates"
    uses: ./.github/workflows/ci.yml

  terraform-plan-dev:
    name: "Terraform Plan — Dev"
    runs-on: ubuntu-latest
    needs: ci-gates  # Hard dependency — deploy never runs if CI fails
    environment: dev  # GitHub Environment for variable/secret access
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef065  # v3.1.2
        with:
          terraform_version: "~1.8"

      # OIDC authentication — no static AWS credentials stored in GitHub
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ vars.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-Dev-${{ github.run_id }}

      - name: Terraform init
        working-directory: infrastructure/environments/dev
        run: terraform init

      - name: Terraform plan
        id: plan
        working-directory: infrastructure/environments/dev
        run: |
          terraform plan \
            -var="github_org=${{ vars.GITHUB_ORG }}" \
            -var="github_repo=${{ github.event.repository.name }}" \
            -var="alert_email=${{ vars.OPS_ALERT_EMAIL }}" \
            -out=tfplan \
            -detailed-exitcode
        continue-on-error: true

      - name: Upload plan artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dev-tfplan
          path: infrastructure/environments/dev/tfplan
          retention-days: 7

      - name: Fail on plan error (exitcode 1)
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "Terraform plan failed. Review errors above."
          exit 1

  terraform-apply-dev:
    name: "Terraform Apply — Dev"
    runs-on: ubuntu-latest
    needs: terraform-plan-dev
    if: needs.terraform-plan-dev.outputs.plan_exitcode == '2'  # 2 = changes present
    environment: dev

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef065  # v3.1.2
        with:
          terraform_version: "~1.8"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ vars.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-Apply-Dev-${{ github.run_id }}

      - name: Terraform init
        working-directory: infrastructure/environments/dev
        run: terraform init

      - name: Download plan artefact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422edd11  # v4.2.1
        with:
          name: dev-tfplan
          path: infrastructure/environments/dev/

      - name: Terraform apply
        working-directory: infrastructure/environments/dev
        run: terraform apply -auto-approve tfplan
