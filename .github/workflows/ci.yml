name: CI — Lint, Type Check, Test, Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, staging, prod]

permissions:
  contents: read
  security-events: write  # Required for uploading SARIF results

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14.6"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Stage 1: Lint and format
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest
    steps:
      # Pin to SHA digest — prevents supply chain attack if tag is moved (OWASP A03)
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.5.0"

      - name: Run ruff lint
        run: ruff check . --output-format=github

      - name: Run ruff format check
        run: ruff format --check .

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 2: Type checking
  # ──────────────────────────────────────────────────────────────────────────
  typecheck:
    name: "Type Check (mypy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy .

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 3: Unit tests with coverage gate
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: "Unit Tests (pytest ≥80% coverage)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 4: Security SAST (bandit)
  # ──────────────────────────────────────────────────────────────────────────
  security-sast:
    name: "Security SAST (bandit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install bandit
        run: pip install "bandit[toml]>=1.7"

      - name: Run bandit
        run: bandit -r . --exclude .venv,tests,dist -c pyproject.toml -f json -o bandit-report.json
        continue-on-error: false  # Hard failure on any finding

      - name: Upload bandit report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 5: Dependency vulnerability scan (pip-audit)
  # ──────────────────────────────────────────────────────────────────────────
  dependency-scan:
    name: "Dependency Scan (pip-audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install project dependencies and pip-audit
        run: pip install -e ".[dev]" pip-audit>=2.7

      - name: Run pip-audit
        # Scan the installed environment; --strict fails on any vulnerability.
        # Do NOT use process substitution (not portable in GitHub Actions runners).
        run: pip-audit --strict

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 6: IaC security scan (checkov)
  # ──────────────────────────────────────────────────────────────────────────
  iac-security-scan:
    name: "IaC Security Scan (checkov)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run checkov
        uses: bridgecrewio/checkov-action@57e50bed6e7e33266f1a9e5a7ad0b2b0b0c9f2f3  # v12.2847.0
        with:
          directory: infrastructure/
          framework: terraform
          output_format: cli
          soft_fail: false        # Hard failure on any HIGH/CRITICAL finding
          download_external_modules: false

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 7: Terraform validate (all environments)
  # ──────────────────────────────────────────────────────────────────────────
  terraform-validate:
    name: "Terraform Validate"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef065  # v3.1.2
        with:
          terraform_version: "~1.8"

      - name: Terraform init (no backend)
        working-directory: infrastructure/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infrastructure/environments/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform fmt check
        working-directory: infrastructure/
        run: terraform fmt -recursive -check
